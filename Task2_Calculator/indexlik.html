<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator — Task 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="calc.css"/>
</head>
<body>

  <div class="calc-wrapper">
    <div class="calc-title">Calculator</div>
    <div class="calc-container">

      <div class="display-panel">
        <div class="expression-row" id="expression">0</div>
        <div class="main-display" id="display">0</div>
      </div>

      <div class="button-grid">
        <button class="calc-btn btn-function" data-action="clear">AC</button>
        <button class="calc-btn btn-function" data-action="ce">CE</button>
        <button class="calc-btn btn-function" data-action="percent">%</button>
        <button class="calc-btn btn-operator" data-action="operator" data-op="÷">÷</button>

        <button class="calc-btn btn-digit" data-action="digit" data-val="7">7</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="8">8</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="9">9</button>
        <button class="calc-btn btn-operator" data-action="operator" data-op="×">×</button>

        <button class="calc-btn btn-digit" data-action="digit" data-val="4">4</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="5">5</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="6">6</button>
        <button class="calc-btn btn-operator" data-action="operator" data-op="-">-</button>

        <button class="calc-btn btn-digit" data-action="digit" data-val="1">1</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="2">2</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="3">3</button>
        <button class="calc-btn btn-operator" data-action="operator" data-op="+">+</button>

        <button class="calc-btn btn-function" data-action="sign">+/-</button>
        <button class="calc-btn btn-digit" data-action="digit" data-val="0">0</button>
        <button class="calc-btn btn-digit" data-action="dot">.</button>
        <button class="calc-btn btn-equals" data-action="equals">=</button>
      </div>

      <div class="keyboard-hint">Keyboard shortcuts supported</div>
    </div>
  </div>

  <script src="calc.js"></script>
</body>
</html>
