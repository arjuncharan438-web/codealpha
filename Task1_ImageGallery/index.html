<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    .gallery-app { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; }

    /* Header */
    .gallery-header { text-align: center; padding: 60px 0 36px; }

    .gallery-title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 40%, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gallery-subtitle { margin-top: 10px; font-size: 16px; color: rgba(255,255,255,0.4); }

    /* Filter bars */
    .filter-section { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 16px; }
    .category-bar, .filter-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .filter-bar { align-items: center; }
    .filter-label { font-size: 12px; color: rgba(255,255,255,0.35); font-weight: 500; margin-right: 2px; }

    .cat-btn {
      padding: 8px 20px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.55);
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s ease;
    }
    .cat-btn:hover { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.4); color: #c4b5fd; }
    .cat-btn.active {
      background: linear-gradient(135deg, #7c3aed, #a78bfa);
      border-color: transparent; color: #fff;
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }

    .filter-btn {
      padding: 5px 14px; border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.45);
      font-size: 12px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all 0.2s ease;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8); }
    .filter-btn.active { background: rgba(167,139,250,0.2); border-color: #a78bfa; color: #c4b5fd; }

    .image-count { text-align: center; font-size: 12px; color: rgba(255,255,255,0.25); margin-bottom: 28px; }

    /* Grid */
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

    .gallery-card { border-radius: 16px; overflow: hidden; cursor: pointer; position: relative; aspect-ratio: 4/3; background: #1a1a24; }
    .card-img-wrap { width: 100%; height: 100%; position: relative; overflow: hidden; }
    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.3s ease; }
    .gallery-card:hover .card-img { transform: scale(1.08); }

    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      align-items: flex-start; padding: 18px;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .gallery-card:hover .card-overlay { opacity: 1; }

    .card-zoom {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0.7);
      font-size: 28px; opacity: 0; color: #fff;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .gallery-card:hover .card-zoom { transform: translate(-50%,-50%) scale(1); opacity: 0.9; }

    .card-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; transform: translateY(6px); transition: transform 0.3s ease; }
    .gallery-card:hover .card-title { transform: translateY(0); }

    .card-category {
      font-size: 11px; font-weight: 500; color: #c4b5fd; text-transform: uppercase;
      letter-spacing: 1px; background: rgba(124,58,237,0.35); padding: 3px 10px;
      border-radius: 100px; transform: translateY(6px); transition: transform 0.3s ease 0.04s;
    }
    .gallery-card:hover .card-category { transform: translateY(0); }

    /* Lightbox */
    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.92); backdrop-filter: blur(12px);
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; animation: lb-fade 0.2s ease; }
    @keyframes lb-fade { from { opacity:0; } to { opacity:1; } }

    .lb-content {
      position: relative; max-width: min(900px, 90vw); max-height: 90vh;
      display: flex; flex-direction: column; align-items: center;
      animation: lb-scale 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes lb-scale { from { transform:scale(0.88); opacity:0; } to { transform:scale(1); opacity:1; } }

    .lb-img {
      max-width: 100%; max-height: 75vh; object-fit: contain;
      border-radius: 12px; display: block;
      opacity: 0; transition: opacity 0.35s ease, filter 0.3s ease;
      box-shadow: 0 32px 80px rgba(0,0,0,0.8);
    }
    .lb-img.loaded { opacity: 1; }

    .lb-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15); border-top-color: #a78bfa;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .lb-caption { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
    .lb-title { font-size: 18px; font-weight: 600; color: #fff; }
    .lb-badge {
      font-size: 11px; font-weight: 600; color: #c4b5fd;
      background: rgba(124,58,237,0.3); border: 1px solid rgba(167,139,250,0.3);
      padding: 3px 12px; border-radius: 100px; text-transform: uppercase; letter-spacing: 1px;
    }
    .lb-counter { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; }

    .lb-nav {
      position: fixed; top: 50%; transform: translateY(-50%);
      width: 52px; height: 52px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.08);
      color: #fff; font-size: 28px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease, transform 0.2s ease;
      z-index: 10000; backdrop-filter: blur(4px);
    }
    .lb-nav:hover { background: rgba(124,58,237,0.5); border-color: #a78bfa; transform: translateY(-50%) scale(1.08); }
    .lb-prev { left: clamp(12px,3vw,40px); }
    .lb-next { right: clamp(12px,3vw,40px); }

    .lb-close {
      position: fixed; top: 20px; right: 20px;
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s ease; z-index: 10001;
    }
    .lb-close:hover { background: rgba(239,68,68,0.5); border-color: #f87171; }

    /* Footer */
    .gallery-footer { text-align: center; padding-top: 48px; font-size: 12px; color: rgba(255,255,255,0.2); }

    /* Responsive */
    @media (max-width: 640px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px,1fr)); gap: 10px; }
      .lb-nav { width: 40px; height: 40px; font-size: 22px; }
    }
    @media (max-width: 400px) { .gallery-grid { grid-template-columns: 1fr 1fr; gap: 8px; } }
  </style>
</head>
<body>

<div class="gallery-app">
  <header class="gallery-header">
    <h1 class="gallery-title">Photo Gallery</h1>
    <p class="gallery-subtitle">Explore beautiful images from around the world</p>
  </header>

  <section class="filter-section">
    <div class="category-bar" id="categoryBar">
      <button class="cat-btn active" data-cat="All">All</button>
      <button class="cat-btn" data-cat="Nature">Nature</button>
      <button class="cat-btn" data-cat="Architecture">Architecture</button>
      <button class="cat-btn" data-cat="Travel">Travel</button>
      <button class="cat-btn" data-cat="Animals">Animals</button>
      <button class="cat-btn" data-cat="Food">Food</button>
    </div>
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">Filter:</span>
      <button class="filter-btn active" data-filter="none">Normal</button>
      <button class="filter-btn" data-filter="grayscale(100%)">Grayscale</button>
      <button class="filter-btn" data-filter="sepia(80%)">Sepia</button>
      <button class="filter-btn" data-filter="saturate(150%) hue-rotate(-10deg)">Warm</button>
      <button class="filter-btn" data-filter="saturate(120%) hue-rotate(30deg)">Cool</button>
      <button class="filter-btn" data-filter="saturate(200%) contrast(110%)">Vivid</button>
    </div>
  </section>

  <div class="image-count" id="imageCount"></div>
  <main class="gallery-grid" id="galleryGrid"></main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">&#x2715;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#8249;</button>
  <div class="lb-content">
    <div class="lb-spinner" id="lbSpinner"></div>
    <img id="lbImg" class="lb-img" src="" alt=""/>
    <div class="lb-caption">
      <span class="lb-title" id="lbTitle"></span>
      <span class="lb-badge" id="lbBadge"></span>
    </div>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
  <button class="lb-nav lb-next" id="lbNext">&#8250;</button>
</div>

<footer class="gallery-footer">
  <p>Use &#8592; &#8594; arrow keys to navigate &middot; ESC to close</p>
</footer>

<script>
  // ── Image Data ───────────────────────────────────────────────────────────────
  const images = [
    { src:"https://picsum.photos/seed/nature1/800/600",  thumb:"https://picsum.photos/seed/nature1/400/300",  title:"Forest Path",     category:"Nature" },
    { src:"https://picsum.photos/seed/arch1/800/600",   thumb:"https://picsum.photos/seed/arch1/400/300",   title:"City Skyline",    category:"Architecture" },
    { src:"https://picsum.photos/seed/travel1/800/600", thumb:"https://picsum.photos/seed/travel1/400/300", title:"Mountain Trail",  category:"Travel" },
    { src:"https://picsum.photos/seed/animal1/800/600", thumb:"https://picsum.photos/seed/animal1/400/300", title:"Wild Deer",       category:"Animals" },
    { src:"https://picsum.photos/seed/food1/800/600",   thumb:"https://picsum.photos/seed/food1/400/300",   title:"Fresh Harvest",   category:"Food" },
    { src:"https://picsum.photos/seed/nature2/800/600", thumb:"https://picsum.photos/seed/nature2/400/300", title:"Autumn Lake",     category:"Nature" },
    { src:"https://picsum.photos/seed/arch2/800/600",   thumb:"https://picsum.photos/seed/arch2/400/300",   title:"Stone Bridge",    category:"Architecture" },
    { src:"https://picsum.photos/seed/travel2/800/600", thumb:"https://picsum.photos/seed/travel2/400/300", title:"Coastal Cliffs",  category:"Travel" },
    { src:"https://picsum.photos/seed/animal2/800/600", thumb:"https://picsum.photos/seed/animal2/400/300", title:"Ocean Turtle",    category:"Animals" },
    { src:"https://picsum.photos/seed/food2/800/600",   thumb:"https://picsum.photos/seed/food2/400/300",   title:"Farmers Market",  category:"Food" },
    { src:"https://picsum.photos/seed/nature3/800/600", thumb:"https://picsum.photos/seed/nature3/400/300", title:"Misty Mountains", category:"Nature" },
    { src:"https://picsum.photos/seed/arch3/800/600",   thumb:"https://picsum.photos/seed/arch3/400/300",   title:"Glass Tower",     category:"Architecture" },
    { src:"https://picsum.photos/seed/travel3/800/600", thumb:"https://picsum.photos/seed/travel3/400/300", title:"Desert Dunes",    category:"Travel" },
    { src:"https://picsum.photos/seed/animal3/800/600", thumb:"https://picsum.photos/seed/animal3/400/300", title:"Arctic Fox",      category:"Animals" },
    { src:"https://picsum.photos/seed/food3/800/600",   thumb:"https://picsum.photos/seed/food3/400/300",   title:"Morning Coffee",  category:"Food" },
    { src:"https://picsum.photos/seed/nature4/800/600", thumb:"https://picsum.photos/seed/nature4/400/300", title:"Waterfall",       category:"Nature" },
    { src:"https://picsum.photos/seed/arch4/800/600",   thumb:"https://picsum.photos/seed/arch4/400/300",   title:"Ancient Temple",  category:"Architecture" },
    { src:"https://picsum.photos/seed/travel4/800/600", thumb:"https://picsum.photos/seed/travel4/400/300", title:"Hidden Village",  category:"Travel" },
  ];

  // ── State ────────────────────────────────────────────────────────────────────
  let activeCategory  = "All";
  let activeCSSFilter = "none";
  let lightboxIndex   = -1;
  let filtered        = [];

  // ── DOM refs ─────────────────────────────────────────────────────────────────
  const grid      = document.getElementById("galleryGrid");
  const countEl   = document.getElementById("imageCount");
  const lightbox  = document.getElementById("lightbox");
  const lbImg     = document.getElementById("lbImg");
  const lbSpinner = document.getElementById("lbSpinner");
  const lbTitle   = document.getElementById("lbTitle");
  const lbBadge   = document.getElementById("lbBadge");
  const lbCounter = document.getElementById("lbCounter");

  // ── Render grid ──────────────────────────────────────────────────────────────
  function renderGrid() {
    filtered = activeCategory === "All"
      ? images
      : images.filter(img => img.category === activeCategory);

    countEl.textContent = filtered.length + " photo" + (filtered.length !== 1 ? "s" : "");
    grid.innerHTML = "";

    filtered.forEach((img, idx) => {
      const card = document.createElement("div");
      card.className = "gallery-card";
      card.innerHTML = `
        <div class="card-img-wrap">
          <img class="card-img" src="${img.thumb}" alt="${img.title}" loading="lazy"
               style="filter:${activeCSSFilter}"/>
          <div class="card-overlay">
            <span class="card-zoom">&#x26F6;</span>
            <p class="card-title">${img.title}</p>
            <span class="card-category">${img.category}</span>
          </div>
        </div>`;
      card.addEventListener("click", () => openLightbox(idx));
      grid.appendChild(card);
    });
  }

  // ── Lightbox ─────────────────────────────────────────────────────────────────
  function openLightbox(idx) {
    lightboxIndex = idx;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
    loadLightboxImage();
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lightboxIndex = -1;
  }

  function loadLightboxImage() {
    const img = filtered[lightboxIndex];
    lbImg.classList.remove("loaded");
    lbSpinner.style.display = "block";
    lbTitle.textContent   = img.title;
    lbBadge.textContent   = img.category;
    lbCounter.textContent = (lightboxIndex + 1) + " / " + filtered.length;
    lbImg.style.filter    = activeCSSFilter;

    const tmp = new Image();
    tmp.onload = () => { lbImg.src = img.src; lbImg.classList.add("loaded"); lbSpinner.style.display = "none"; };
    tmp.src = img.src;
  }

  function goNext() {
    if (lightboxIndex === -1) return;
    lightboxIndex = (lightboxIndex + 1) % filtered.length;
    loadLightboxImage();
  }

  function goPrev() {
    if (lightboxIndex === -1) return;
    lightboxIndex = (lightboxIndex - 1 + filtered.length) % filtered.length;
    loadLightboxImage();
  }

  // ── Events ───────────────────────────────────────────────────────────────────
  document.getElementById("categoryBar").addEventListener("click", e => {
    const btn = e.target.closest(".cat-btn");
    if (!btn) return;
    document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat;
    renderGrid();
  });

  document.getElementById("filterBar").addEventListener("click", e => {
    const btn = e.target.closest(".filter-btn");
    if (!btn) return;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCSSFilter = btn.dataset.filter;
    document.querySelectorAll(".card-img").forEach(img => img.style.filter = activeCSSFilter);
    if (lightboxIndex !== -1) lbImg.style.filter = activeCSSFilter;
  });

  document.getElementById("lbClose").addEventListener("click", closeLightbox);
  document.getElementById("lbPrev").addEventListener("click", e => { e.stopPropagation(); goPrev(); });
  document.getElementById("lbNext").addEventListener("click", e => { e.stopPropagation(); goNext(); });
  lightbox.addEventListener("click", e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener("keydown", e => {
    if (lightboxIndex === -1) return;
    if (e.key === "ArrowRight") goNext();
    if (e.key === "ArrowLeft")  goPrev();
    if (e.key === "Escape")     closeLightbox();
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  renderGrid();
</script>

</body>
</html>
