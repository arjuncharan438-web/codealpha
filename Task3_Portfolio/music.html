<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app { display: flex; gap: 20px; align-items: flex-start; width: 100%; max-width: 860px; }

    /* Player Card */
    .player-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 32px 28px;
      width: 340px; min-width: 340px;
      display: flex; flex-direction: column; align-items: center; gap: 22px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }

    /* Album Art */
    .album-art-wrap { position: relative; width: 220px; height: 220px; }
    .album-art {
      width: 220px; height: 220px; border-radius: 50%; object-fit: cover;
      border: 4px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .album-art.spinning { animation: spin-art 12s linear infinite; }
    @keyframes spin-art { to { transform: rotate(360deg); } }
    .art-glow {
      position: absolute; inset: -10px; border-radius: 50%;
      filter: blur(24px); opacity: 0.45; z-index: -1; transition: background 0.5s;
    }

    /* Song Info */
    .song-info { text-align: center; width: 100%; }
    .song-title { font-size: 20px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-artist { font-size: 14px; color: rgba(255,255,255,0.45); margin-top: 4px; }

    /* Progress */
    .progress-section { display: flex; align-items: center; gap: 10px; width: 100%; }
    .time { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 500; min-width: 32px; text-align: center; }
    .progress-bar-wrap { flex: 1; cursor: pointer; padding: 8px 0; }
    .progress-bar-bg { height: 4px; background: rgba(255,255,255,0.12); border-radius: 4px; position: relative; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#a78bfa,#818cf8); border-radius: 4px; width: 0%; }
    .progress-thumb {
      width: 14px; height: 14px; border-radius: 50%; background: #fff;
      position: absolute; top: 50%; left: 0%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px rgba(167,139,250,0.8);
      opacity: 0; transition: opacity 0.2s;
    }
    .progress-bar-wrap:hover .progress-thumb { opacity: 1; }

    /* Controls */
    .controls { display: flex; align-items: center; gap: 10px; }
    .ctrl-btn {
      width: 44px; height: 44px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; padding: 0;
    }
    .ctrl-btn svg { width: 18px; height: 18px; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.15); color: #fff; transform: scale(1.08); }
    .ctrl-btn.ctrl-sm { width: 36px; height: 36px; }
    .ctrl-btn.ctrl-sm svg { width: 15px; height: 15px; }
    .ctrl-btn.ctrl-play {
      width: 60px; height: 60px;
      background: linear-gradient(135deg,#7c3aed,#a78bfa); color: #fff;
      box-shadow: 0 6px 24px rgba(124,58,237,0.5);
    }
    .ctrl-btn.ctrl-play svg { width: 22px; height: 22px; }
    .ctrl-btn.ctrl-play:hover { transform: scale(1.1); box-shadow: 0 8px 30px rgba(124,58,237,0.7); }
    .ctrl-btn.btn-active { color: #a78bfa; }

    /* Volume */
    .volume-section { display: flex; align-items: center; gap: 10px; width: 100%; }
    .vol-btn { border: none; background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; padding: 0; display: flex; }
    .vol-btn svg { width: 20px; height: 20px; }
    .vol-btn:hover { color: #fff; }
    .vol-bar-wrap { flex: 1; cursor: pointer; padding: 8px 0; }
    .vol-bar-bg { height: 4px; background: rgba(255,255,255,0.12); border-radius: 4px; }
    .vol-bar-fill { height: 100%; background: linear-gradient(90deg,#a78bfa,#818cf8); border-radius: 4px; width: 80%; }
    .vol-label { font-size: 11px; color: rgba(255,255,255,0.35); min-width: 32px; text-align: right; }

    /* Autoplay Toggle */
    .autoplay-row { width: 100%; display: flex; justify-content: center; }
    .toggle-label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .toggle-label input { display: none; }
    .toggle-track { width: 40px; height: 22px; border-radius: 100px; background: rgba(255,255,255,0.15); position: relative; transition: background 0.25s; display: block; }
    .toggle-thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff; position: absolute; top: 3px; left: 3px; transition: left 0.25s; display: block; }
    .toggle-label input:checked + .toggle-track { background: #7c3aed; }
    .toggle-label input:checked + .toggle-track .toggle-thumb { left: 21px; }
    .toggle-text { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 500; }

    /* Playlist */
    .playlist-card {
      flex: 1;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px; overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      max-height: 540px; display: flex; flex-direction: column;
    }
    .playlist-header { padding: 20px 22px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .playlist-title { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 1.5px; }
    .playlist-count { font-size: 12px; color: rgba(255,255,255,0.3); }
    .playlist { list-style: none; overflow-y: auto; flex: 1; }
    .playlist::-webkit-scrollbar { width: 4px; }
    .playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    .playlist-item { display: flex; align-items: center; gap: 14px; padding: 12px 22px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .playlist-item:hover { background: rgba(255,255,255,0.06); }
    .playlist-item.active { background: rgba(124,58,237,0.2); border-left: 3px solid #a78bfa; padding-left: 19px; }
    .pl-thumb { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .pl-info { flex: 1; min-width: 0; }
    .pl-title { font-size: 13px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-artist { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .pl-duration { font-size: 11px; color: rgba(255,255,255,0.3); flex-shrink: 0; }
    .pl-playing { display: flex; gap: 2px; align-items: flex-end; height: 16px; flex-shrink: 0; }
    .pl-bar { width: 3px; background: #a78bfa; border-radius: 2px; animation: bar-bounce 0.6s ease infinite alternate; }
    .pl-bar:nth-child(2) { animation-delay: 0.15s; }
    .pl-bar:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bar-bounce { from { height: 4px; } to { height: 14px; } }

    @media (max-width: 700px) {
      .app { flex-direction: column; align-items: center; }
      .player-card { min-width: unset; width: 100%; max-width: 380px; }
      .playlist-card { width: 100%; max-width: 380px; max-height: 300px; }
    }
  </style>
</head>
<body>

<div class="app">
  <!-- Player Card -->
  <div class="player-card">
    <div class="album-art-wrap">
      <img id="albumArt" class="album-art" src="" alt="Album Art"/>
      <div class="art-glow" id="artGlow"></div>
    </div>
    <div class="song-info">
      <h2 class="song-title" id="songTitle">Song Title</h2>
      <p class="song-artist" id="songArtist">Artist</p>
    </div>
    <div class="progress-section">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn ctrl-sm" id="shuffleBtn" title="Shuffle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 3 21 3 21 8"/><polyline points="4 20 4 15 9 15"/>
          <path d="M21 3l-7 7-4-4-6 6"/><path d="M15 15l6 6"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="prevBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="19 20 9 12 19 4 19 20"/>
          <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-play" id="playBtn">
        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="nextBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 4 15 12 5 20 5 4"/>
          <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <button class="ctrl-btn ctrl-sm" id="repeatBtn" title="Repeat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
      </button>
    </div>
    <div class="volume-section">
      <button class="vol-btn" id="muteBtn">
        <svg id="volIcon" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="currentColor" stroke-width="2"/>
        </svg>
        <svg id="muteIcon" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/>
          <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>
        </svg>
      </button>
      <div class="vol-bar-wrap" id="volWrap">
        <div class="vol-bar-bg"><div class="vol-bar-fill" id="volFill"></div></div>
      </div>
      <span class="vol-label" id="volLabel">80%</span>
    </div>
    <div class="autoplay-row">
      <label class="toggle-label">
        <input type="checkbox" id="autoplayCheck" checked/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        <span class="toggle-text">Autoplay</span>
      </label>
    </div>
  </div>

  <!-- Playlist -->
  <div class="playlist-card">
    <div class="playlist-header">
      <span class="playlist-title">Playlist</span>
      <span class="playlist-count" id="playlistCount"></span>
    </div>
    <ul class="playlist" id="playlist"></ul>
  </div>
</div>

<audio id="audio"></audio>

<script>
  const songs = [
    { title:"Electronic Sunrise", artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", art:"https://picsum.photos/seed/music1/300/300", color:"#7c3aed" },
    { title:"Midnight Drive",     artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", art:"https://picsum.photos/seed/music2/300/300", color:"#0ea5e9" },
    { title:"Neon Dreams",        artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", art:"https://picsum.photos/seed/music3/300/300", color:"#ec4899" },
    { title:"Urban Groove",       artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", art:"https://picsum.photos/seed/music4/300/300", color:"#10b981" },
    { title:"Crystal Waters",     artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", art:"https://picsum.photos/seed/music5/300/300", color:"#f59e0b" },
    { title:"City Lights",        artist:"SoundHelix", src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", art:"https://picsum.photos/seed/music6/300/300", color:"#ef4444" },
  ];

  let currentIndex = 0, isPlaying = false, isShuffle = false;
  let isRepeat = false, isMuted = false, volume = 0.8, isDragging = false;

  const audio         = document.getElementById("audio");
  const albumArt      = document.getElementById("albumArt");
  const artGlow       = document.getElementById("artGlow");
  const songTitle     = document.getElementById("songTitle");
  const songArtist    = document.getElementById("songArtist");
  const currentTimeEl = document.getElementById("currentTime");
  const totalTimeEl   = document.getElementById("totalTime");
  const progressFill  = document.getElementById("progressFill");
  const progressThumb = document.getElementById("progressThumb");
  const progressWrap  = document.getElementById("progressWrap");
  const playBtn       = document.getElementById("playBtn");
  const playIcon      = document.getElementById("playIcon");
  const pauseIcon     = document.getElementById("pauseIcon");
  const volFill       = document.getElementById("volFill");
  const volWrap       = document.getElementById("volWrap");
  const volLabel      = document.getElementById("volLabel");
  const volIcon       = document.getElementById("volIcon");
  const muteIcon      = document.getElementById("muteIcon");
  const playlistEl    = document.getElementById("playlist");
  const autoplayCheck = document.getElementById("autoplayCheck");

  function fmt(s) {
    if (isNaN(s)) return "0:00";
    return Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2,"0");
  }

  function loadSong(i) {
    const s = songs[i];
    audio.src = s.src;
    albumArt.src = s.art;
    songTitle.textContent  = s.title;
    songArtist.textContent = s.artist;
    artGlow.style.background = s.color;
    document.body.style.background = `linear-gradient(135deg,${s.color}44,#302b63,#0f0c29)`;
    progressFill.style.width = "0%";
    progressThumb.style.left = "0%";
    currentTimeEl.textContent = "0:00";
    totalTimeEl.textContent   = "0:00";
    buildPlaylist();
  }

  function play()  { audio.play(); isPlaying=true;  playIcon.style.display="none";  pauseIcon.style.display="block"; albumArt.classList.add("spinning");    buildPlaylist(); }
  function pause() { audio.pause();isPlaying=false; playIcon.style.display="block"; pauseIcon.style.display="none";  albumArt.classList.remove("spinning"); buildPlaylist(); }
  function togglePlay() { isPlaying ? pause() : play(); }

  function nextSong() {
    currentIndex = isShuffle
      ? (function(){ let r; do{r=Math.floor(Math.random()*songs.length);}while(r===currentIndex&&songs.length>1); return r; })()
      : (currentIndex+1) % songs.length;
    loadSong(currentIndex);
    if (isPlaying) play();
  }

  function prevSong() {
    if (audio.currentTime > 3) { audio.currentTime=0; return; }
    currentIndex = (currentIndex-1+songs.length) % songs.length;
    loadSong(currentIndex);
    if (isPlaying) play();
  }

  audio.addEventListener("timeupdate", () => {
    if (isDragging || !audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + "%";
    progressThumb.style.left = pct + "%";
    currentTimeEl.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener("loadedmetadata", () => { totalTimeEl.textContent = fmt(audio.duration); });

  audio.addEventListener("ended", () => {
    if (isRepeat) { audio.currentTime=0; play(); }
    else if (autoplayCheck.checked) { nextSong(); play(); }
    else pause();
  });

  function seekTo(e) {
    const r = progressWrap.getBoundingClientRect();
    const pct = Math.max(0, Math.min((e.clientX-r.left)/r.width, 1));
    audio.currentTime = pct * audio.duration;
    progressFill.style.width = (pct*100)+"%";
    progressThumb.style.left = (pct*100)+"%";
  }

  progressWrap.addEventListener("mousedown",  e => { isDragging=true; seekTo(e); });
  document.addEventListener("mousemove",      e => { if(isDragging) seekTo(e); });
  document.addEventListener("mouseup",        ()  => { isDragging=false; });
  progressWrap.addEventListener("touchstart", e => { isDragging=true; seekTo(e.touches[0]); });
  document.addEventListener("touchmove",      e => { if(isDragging) seekTo(e.touches[0]); });
  document.addEventListener("touchend",       ()  => { isDragging=false; });

  function setVolume(v) {
    volume = Math.max(0, Math.min(1, v));
    audio.volume = isMuted ? 0 : volume;
    volFill.style.width = (volume*100)+"%";
    volLabel.textContent = Math.round(volume*100)+"%";
  }

  volWrap.addEventListener("click", e => {
    const r = volWrap.getBoundingClientRect();
    setVolume((e.clientX-r.left)/r.width);
  });

  document.getElementById("muteBtn").addEventListener("click", () => {
    isMuted = !isMuted;
    audio.volume = isMuted ? 0 : volume;
    volIcon.style.display  = isMuted ? "none"  : "block";
    muteIcon.style.display = isMuted ? "block" : "none";
  });

  document.getElementById("shuffleBtn").addEventListener("click", () => {
    isShuffle = !isShuffle;
    document.getElementById("shuffleBtn").classList.toggle("btn-active", isShuffle);
  });

  document.getElementById("repeatBtn").addEventListener("click", () => {
    isRepeat = !isRepeat;
    document.getElementById("repeatBtn").classList.toggle("btn-active", isRepeat);
  });

  document.getElementById("playBtn").addEventListener("click", togglePlay);
  document.getElementById("nextBtn").addEventListener("click", nextSong);
  document.getElementById("prevBtn").addEventListener("click", prevSong);

  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === " ")            { e.preventDefault(); togglePlay(); }
    else if (e.key==="ArrowRight") nextSong();
    else if (e.key==="ArrowLeft")  prevSong();
    else if (e.key==="ArrowUp")    { e.preventDefault(); setVolume(volume+0.1); }
    else if (e.key==="ArrowDown")  { e.preventDefault(); setVolume(volume-0.1); }
    else if (e.key==="m"||e.key==="M") document.getElementById("muteBtn").click();
  });

  function buildPlaylist() {
    playlistEl.innerHTML = "";
    document.getElementById("playlistCount").textContent = songs.length + " songs";
    songs.forEach((s, i) => {
      const li = document.createElement("li");
      li.className = "playlist-item" + (i===currentIndex ? " active" : "");
      li.innerHTML = `
        <img class="pl-thumb" src="${s.art}" alt="${s.title}"/>
        <div class="pl-info">
          <div class="pl-title">${s.title}</div>
          <div class="pl-artist">${s.artist}</div>
        </div>
        ${i===currentIndex && isPlaying
          ? `<div class="pl-playing"><div class="pl-bar"></div><div class="pl-bar"></div><div class="pl-bar"></div></div>`
          : `<span class="pl-duration">${s.duration||"--:--"}</span>`}`;
      li.addEventListener("click", () => { currentIndex=i; loadSong(i); play(); });
      playlistEl.appendChild(li);
    });
  }

  // Preload durations
  songs.forEach((s, i) => {
    const t = new Audio(); t.src = s.src;
    t.addEventListener("loadedmetadata", () => {
      s.duration = fmt(t.duration);
      const el = playlistEl.querySelector(`.playlist-item:nth-child(${i+1}) .pl-duration`);
      if (el) el.textContent = s.duration;
    });
  });

  setVolume(0.8);
  loadSong(0);
  buildPlaylist();
</script>
</body>
</html>
